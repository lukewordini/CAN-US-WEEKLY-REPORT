<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.tabs {
    display: flex;
    background-color: #2c3e50;
    padding: 0;
}

.tab-btn {
    background: none;
    border: none;
    color: white;
    padding: 15px 25px;
    cursor: pointer;
    font-size: 16px;
}

.tab-btn:hover {
    background-color: #34495e;
}

.tab-btn.active {
    background-color: #3498db;
}

.viewer {
    width: 100%;
    height: calc(100vh - 55px);
    border: none;
}
</style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active"
        onclick="loadPDF('pdfs/document1.pdf', this)">
        Document 1
    </button>

    <button class="tab-btn"
        onclick="loadPDF('pdfs/document2.pdf', this)">
        Document 2
    </button>

    <button class="tab-btn"
        onclick="loadPDF('pdfs/document3.pdf', this)">
        Document 3
    </button>

    <button class="tab-btn"
        onclick="loadPDF('pdfs/document4.pdf', this)">
        Document 4
    </button>
</div>

<iframe
    id.pdf

<script>
function loadPDF(pdfPath, button) {
    document.getElementById('pdfViewer').src = pdfPath;

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });

    button.classList.add('active');
}
</script>

</body>
</html>
